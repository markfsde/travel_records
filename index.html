<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>旅迹 · 我的旅行轨迹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05080f;
    --panel:rgba(13,20,38,.82);
    --line:rgba(80,200,255,.18);
    --line-strong:rgba(90,210,255,.4);
    --cyan:#3fe0ff;
    --cyan-dim:#1b8aa8;
    --magenta:#ff4d9d;
    --amber:#ffb547;
    --text:#dceaf5;
    --text-dim:#7d93a8;
    --glow:0 0 20px rgba(63,224,255,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:'Space Grotesk','Noto Sans SC',sans-serif;}
  body{background:radial-gradient(ellipse at 50% 40%, #0c1730 0%, #05080f 60%, #03050a 100%);}

  #scene{position:fixed;inset:0;z-index:1;}
  canvas{display:block;}

  body::before{content:"";position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.35;
    background-image:linear-gradient(rgba(63,224,255,.05) 1px,transparent 1px),
      linear-gradient(90deg,rgba(63,224,255,.05) 1px,transparent 1px);
    background-size:54px 54px;
    mask-image:radial-gradient(ellipse at center,#000 30%,transparent 75%);
    -webkit-mask-image:radial-gradient(ellipse at center,#000 30%,transparent 75%);}

  header{position:fixed;top:0;left:0;right:0;z-index:10;padding:20px 26px;display:flex;
    align-items:center;gap:16px;pointer-events:none;}
  .logo{font-weight:700;font-size:26px;letter-spacing:6px;color:#fff;text-shadow:var(--glow);}
  .logo b{color:var(--cyan);}
  .tagline{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;
    color:var(--text-dim);text-transform:uppercase;border-left:1px solid var(--line-strong);padding-left:14px;}
  .count{margin-left:auto;pointer-events:auto;font-family:'JetBrains Mono',monospace;font-size:12px;
    letter-spacing:2px;color:var(--cyan);border:1px solid var(--line-strong);padding:7px 16px;
    border-radius:2px;background:rgba(13,20,38,.6);backdrop-filter:blur(8px);
    box-shadow:inset 0 0 12px rgba(63,224,255,.12);}
  .count b{color:#fff;font-size:15px;}

  .toolbar{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;justify-content:center;
    gap:12px;padding:22px;pointer-events:none;flex-wrap:wrap;}
  .btn{pointer-events:auto;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:500;
    font-size:14px;letter-spacing:1px;color:var(--text);background:rgba(13,20,38,.7);padding:12px 22px;
    border-radius:3px;border:1px solid var(--line-strong);backdrop-filter:blur(10px);transition:.18s;
    text-transform:uppercase;}
  .btn:hover{color:#fff;border-color:var(--cyan);box-shadow:var(--glow);transform:translateY(-2px);}
  .btn:active{transform:translateY(0);}
  .btn.primary{background:linear-gradient(135deg,rgba(63,224,255,.22),rgba(63,224,255,.08));
    border-color:var(--cyan);color:#fff;box-shadow:inset 0 0 16px rgba(63,224,255,.2);}
  .btn.primary:hover{box-shadow:var(--glow),inset 0 0 16px rgba(63,224,255,.3);}

  .scrim{position:fixed;inset:0;z-index:30;background:rgba(3,6,14,.7);backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;padding:20px;}
  .scrim.show{display:flex;animation:fade .2s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  .panel{background:var(--panel);width:min(460px,94vw);max-height:88vh;overflow-y:auto;border-radius:6px;
    border:1px solid var(--line-strong);position:relative;
    box-shadow:0 24px 70px rgba(0,0,0,.6),inset 0 0 40px rgba(63,224,255,.06);backdrop-filter:blur(16px);}
  .panel::-webkit-scrollbar{width:8px;}
  .panel::-webkit-scrollbar-thumb{background:var(--cyan-dim);border-radius:8px;}
  .panel::before,.panel::after{content:"";position:absolute;width:18px;height:18px;
    border:2px solid var(--cyan);opacity:.7;}
  .panel::before{top:-1px;left:-1px;border-right:none;border-bottom:none;}
  .panel::after{bottom:-1px;right:-1px;border-left:none;border-top:none;}

  .card-pad{padding:26px 26px 28px;}
  .coord{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--cyan);
    margin-bottom:6px;opacity:.85;}
  .place-name{font-weight:700;font-size:30px;margin:0;letter-spacing:1px;color:#fff;}
  .place-date{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-dim);
    margin:6px 0 18px;letter-spacing:1px;}
  .place-date::before{content:"▸ ";color:var(--cyan);}
  .photos{display:flex;gap:10px;overflow-x:auto;padding:2px 0 14px;scroll-snap-type:x mandatory;}
  .ph{flex:0 0 auto;position:relative;scroll-snap-align:center;border:1px solid var(--line-strong);
    border-radius:3px;overflow:hidden;box-shadow:0 0 18px rgba(63,224,255,.12);}
  .ph img{display:block;width:220px;height:160px;object-fit:cover;}
  .ph::after{content:"";position:absolute;inset:0;border:1px solid rgba(63,224,255,.25);pointer-events:none;}
  .note{font-size:16px;line-height:1.6;color:var(--text);white-space:pre-wrap;margin-top:8px;
    padding-left:14px;border-left:2px solid var(--cyan-dim);}
  .card-actions{display:flex;gap:8px;margin-top:22px;flex-wrap:wrap;}
  .link{cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1px;
    color:var(--text-dim);background:rgba(255,255,255,.03);border:1px solid var(--line);padding:8px 14px;
    border-radius:3px;transition:.15s;text-transform:uppercase;}
  .link:hover{color:var(--cyan);border-color:var(--cyan);}
  .link.danger:hover{color:var(--magenta);border-color:var(--magenta);}

  .form-head{padding:22px 26px 16px;border-bottom:1px solid var(--line);}
  .form-head h2{font-weight:600;font-size:22px;margin:0;letter-spacing:1px;}
  .form-head h2 .pre{font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:14px;margin-right:8px;}
  .form-head p{font-size:13px;color:var(--text-dim);margin:6px 0 0;}
  .form-body{padding:18px 26px 26px;}
  label{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;
    text-transform:uppercase;color:var(--text-dim);margin:16px 0 6px;}
  input[type=text],input[type=date],textarea{width:100%;font-family:'Space Grotesk',sans-serif;font-size:16px;
    color:var(--text);background:rgba(63,224,255,.04);border:1px solid var(--line-strong);border-radius:3px;
    padding:10px 12px;outline:none;transition:.15s;}
  input:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(63,224,255,.15);
    background:rgba(63,224,255,.07);}
  input::placeholder,textarea::placeholder{color:#46586b;}
  textarea{min-height:80px;resize:vertical;line-height:1.5;}
  .geo-row{display:flex;gap:10px;align-items:stretch;}
  .geo-row>div{flex:1;}
  .geo-row .btn{font-size:12px;padding:0 16px;white-space:nowrap;}
  .geo-status{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--cyan);min-height:18px;
    margin-top:8px;letter-spacing:1px;}
  .geo-status.err{color:var(--amber);}
  .thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .thumb{position:relative;width:66px;height:66px;border-radius:3px;overflow:hidden;border:1px solid var(--line-strong);}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .thumb button{position:absolute;top:2px;right:2px;background:var(--magenta);color:#fff;border:none;
    width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:11px;line-height:1;}
  .filepick{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-family:'JetBrains Mono',monospace;
    font-size:12px;letter-spacing:1px;color:var(--cyan);border:1px dashed var(--line-strong);padding:10px 16px;
    border-radius:3px;margin-top:4px;transition:.15s;text-transform:uppercase;}
  .filepick:hover{border-color:var(--cyan);background:rgba(63,224,255,.06);}
  .filepick input{display:none;}
  .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;}

  #tip{position:fixed;z-index:20;pointer-events:none;background:rgba(8,14,28,.92);color:#fff;
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1px;padding:5px 12px;
    border:1px solid var(--cyan);border-radius:3px;transform:translate(-50%,-150%);opacity:0;
    transition:opacity .12s;white-space:nowrap;box-shadow:var(--glow);}

  .hint-empty{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;text-align:center;pointer-events:none;}
  .hint-empty .big{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:4px;color:var(--cyan);
    text-transform:uppercase;opacity:.8;}
  .hint-empty .small{font-size:15px;color:var(--text-dim);margin-top:10px;}
  .hidden{display:none!important;}

  .help{position:fixed;right:18px;bottom:80px;z-index:10;font-family:'JetBrains Mono',monospace;font-size:10px;
    letter-spacing:1px;color:var(--text-dim);text-align:right;line-height:1.7;pointer-events:none;opacity:.6;}
  .help b{color:var(--cyan);}

  .io-hint{position:fixed;left:20px;bottom:24px;z-index:9;display:flex;flex-direction:column;gap:6px;
    max-width:300px;pointer-events:none;}
  .io-hint span{font-size:11px;line-height:1.4;letter-spacing:.5px;color:var(--text-dim);opacity:.7;}
  .io-hint b{color:var(--cyan);font-weight:600;}

  @media (max-width:520px){
    .logo{font-size:20px;letter-spacing:4px;} .tagline{display:none;}
    .btn{font-size:12px;padding:11px 14px;} .help{display:none;} .io-hint{display:none;}
  }
</style>
</head>
<body>
<div id="scene"></div>

<header>
  <span class="logo">旅<b>迹</b></span>
  <span class="tagline">我的旅行轨迹</span>
  <span class="count" id="count">已点亮 <b>0</b> 个地点</span>
</header>

<div class="hint-empty" id="emptyHint">
  <div class="big">// 暂无记录</div>
  <div class="small">点击下方「记一笔」，标记你去过的地方</div>
</div>

<div class="help">
  <div><b>拖拽 / 滑动</b> 旋转地球</div>
  <div><b>捏合 / 双击</b> 缩放</div>
  <div><b>点击光点</b> 查看记录</div>
</div>

<div class="toolbar">
  <button class="btn primary" id="addBtn">＋ 记一笔</button>
  <button class="btn" id="exportBtn" title="把所有地点和照片打包成一个备份文件下载到本地，用于保存或换设备">导出备份</button>
  <label class="btn" style="cursor:pointer" title="读取之前导出的备份文件，恢复所有地点和照片（会替换当前数据）">导入备份
    <input type="file" id="importInput" accept="application/json" style="display:none">
  </label>
</div>

<div class="io-hint">
  <span><b>导出备份</b>：把全部地点和照片存成一个文件，换电脑或清缓存前先存一份</span>
  <span><b>导入备份</b>：用之前存的文件一键恢复（会覆盖当前数据）</span>
</div>

<div id="tip"></div>

<div class="scrim" id="viewScrim">
  <div class="panel"><div id="viewCard" class="card-pad"></div></div>
</div>

<div class="scrim" id="formScrim">
  <div class="panel">
    <div class="form-head">
      <h2 id="formTitle"><span class="pre">新增</span>记录一个地点</h2>
      <p>标记地点、上传照片，光点会在地球上亮起。</p>
    </div>
    <div class="form-body">
      <label>地点名称</label>
      <div class="geo-row">
        <div><input type="text" id="fPlace" placeholder="京都 / 大理 / 巴黎"></div>
        <button class="btn" id="geoBtn">定位</button>
      </div>
      <div class="geo-status" id="geoStatus"></div>

      <label>到访日期</label>
      <input type="date" id="fDate">

      <label>记录</label>
      <textarea id="fNote" placeholder="天气、遇到的人、印象最深的瞬间…"></textarea>

      <label>照片</label>
      <label class="filepick">＋ 上传照片
        <input type="file" id="fPhotos" accept="image/*" multiple>
      </label>
      <div class="thumbs" id="thumbs"></div>

      <div class="form-actions">
        <button class="link" id="cancelBtn">取消</button>
        <button class="btn primary" id="saveBtn">点亮地点</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const KEY='travel-journal-v1';
let places=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(places));refreshMarkers();updateCount();}
function updateCount(){
  document.getElementById('count').innerHTML='已点亮 <b>'+places.length+'</b> 个地点';
  document.getElementById('emptyHint').classList.toggle('hidden',places.length>0);
}

const sceneEl=document.getElementById('scene');
let W=innerWidth,H=innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,H);sceneEl.appendChild(renderer.domElement);
renderer.domElement.style.cursor='grab';

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42,W/H,0.1,100);
camera.position.set(0,0,7.6);
const globe=new THREE.Group();scene.add(globe);
const R=2.4;

const LAND=[
  {name:'NORTH AMERICA',abbr:'N.A',lat:45,lon:-100,poly:[[-168,65],[-150,68],[-120,60],[-95,49],[-80,42],[-82,28],[-97,18],[-105,23],[-117,32],[-125,40],[-130,55],[-160,58]]},
  {name:'SOUTH AMERICA',abbr:'S.A',lat:-18,lon:-60,poly:[[-82,12],[-70,8],[-55,-5],[-40,-12],[-48,-23],[-58,-34],[-70,-50],[-72,-30],[-78,-8],[-80,2]]},
  {name:'AFRICA',abbr:'AFR',lat:2,lon:18,poly:[[-12,35],[5,37],[18,33],[33,31],[44,12],[51,12],[42,-2],[40,-16],[30,-30],[20,-34],[12,-22],[8,4],[-6,5],[-16,15],[-17,25]]},
  {name:'EUROPE',abbr:'EUR',lat:54,lon:20,poly:[[-10,44],[2,50],[12,55],[28,60],[40,68],[60,70],[50,55],[55,42],[44,40],[28,46],[14,46],[2,44]]},
  {name:'ASIA',abbr:'ASIA',lat:48,lon:95,poly:[[44,40],[60,55],[90,68],[120,72],[145,68],[170,66],[178,62],[150,52],[135,44],[122,40],[120,22],[105,12],[92,20],[78,8],[70,22],[60,30],[50,38]]},
  {name:'OCEANIA',abbr:'OCE',lat:-25,lon:133,poly:[[114,-12],[130,-12],[145,-18],[150,-28],[140,-38],[128,-32],[116,-34],[113,-22]]},
];

function makeEarthTexture(){
  const c=document.createElement('canvas');c.width=4096;c.height=2048;
  const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,2048);
  g.addColorStop(0,'#06101f');g.addColorStop(.5,'#081726');g.addColorStop(1,'#06101f');
  x.fillStyle=g;x.fillRect(0,0,4096,2048);
  x.strokeStyle='rgba(63,224,255,0.10)';x.lineWidth=1.4;
  for(let lon=-180;lon<=180;lon+=15){const px=(lon+180)/360*4096;x.beginPath();x.moveTo(px,0);x.lineTo(px,2048);x.stroke();}
  for(let lat=-75;lat<=75;lat+=15){const py=(90-lat)/180*2048;x.beginPath();x.moveTo(0,py);x.lineTo(4096,py);x.stroke();}
  x.strokeStyle='rgba(63,224,255,0.28)';x.lineWidth=2;x.beginPath();x.moveTo(0,1024);x.lineTo(4096,1024);x.stroke();
  LAND.forEach(L=>{
    x.beginPath();
    L.poly.forEach((p,i)=>{const px=(p[0]+180)/360*4096,py=(90-p[1])/180*2048;i?x.lineTo(px,py):x.moveTo(px,py);});
    x.closePath();
    x.fillStyle='rgba(20,52,74,0.92)';x.fill();
    x.save();x.clip();
    const cx=(L.lon+180)/360*4096,cy=(90-L.lat)/180*2048;
    const rg=x.createRadialGradient(cx,cy,10,cx,cy,700);
    rg.addColorStop(0,'rgba(63,224,255,0.18)');rg.addColorStop(1,'rgba(63,224,255,0)');
    x.fillStyle=rg;x.fillRect(0,0,4096,2048);
    x.restore();
    x.lineWidth=2.4;x.strokeStyle='rgba(63,224,255,0.65)';x.shadowColor='rgba(63,224,255,0.8)';x.shadowBlur=12;x.stroke();x.shadowBlur=0;
    x.save();x.clip();x.fillStyle='rgba(63,224,255,0.10)';
    for(let yy=cy-600;yy<cy+600;yy+=14)for(let xx=cx-700;xx<cx+700;xx+=14){x.fillRect(xx,yy,1.4,1.4);}
    x.restore();
    x.save();
    x.font='700 38px "JetBrains Mono", monospace';x.fillStyle='rgba(180,235,255,0.85)';x.textAlign='center';
    x.shadowColor='rgba(63,224,255,0.9)';x.shadowBlur=10;x.fillText(L.abbr,cx,cy+6);
    x.font='500 15px "JetBrains Mono", monospace';x.fillStyle='rgba(125,200,230,0.6)';x.shadowBlur=4;x.fillText(L.name,cx,cy+26);
    x.restore();
  });
  const t=new THREE.CanvasTexture(c);t.anisotropy=4;return t;
}

const earthMat=new THREE.MeshPhongMaterial({map:makeEarthTexture(),emissive:0x0a1a2a,emissiveIntensity:.6,shininess:8,specular:0x18384a});
const earth=new THREE.Mesh(new THREE.SphereGeometry(R,96,96),earthMat);
globe.add(earth);

const wire=new THREE.Mesh(new THREE.SphereGeometry(R*1.004,36,24),
  new THREE.MeshBasicMaterial({color:0x3fe0ff,wireframe:true,transparent:true,opacity:.06}));
globe.add(wire);

const atmoMat=new THREE.ShaderMaterial({
  transparent:true,side:THREE.BackSide,uniforms:{c:{value:new THREE.Color(0x3fe0ff)}},
  vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec3 vN;uniform vec3 c;void main(){float i=pow(0.7-dot(vN,vec3(0,0,1.)),2.5);gl_FragColor=vec4(c,i*0.9);}`
});
globe.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.18,48,48),atmoMat));

(function(){
  const n=900,pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){const r=30+Math.random()*30,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pos[i*3+2]=r*Math.cos(ph);}
  const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0x6fbfe0,size:.08,transparent:true,opacity:.7})));
})();

scene.add(new THREE.AmbientLight(0x88aacc,.7));
const key=new THREE.DirectionalLight(0xbfe6ff,.8);key.position.set(5,3,5);scene.add(key);
const rim=new THREE.DirectionalLight(0x3fe0ff,.4);rim.position.set(-5,-2,-4);scene.add(rim);

const markerGroup=new THREE.Group();globe.add(markerGroup);
let markerMeshes=[];
function latLonToVec(lat,lon,radius){
  const phi=(90-lat)*Math.PI/180,theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-radius*Math.sin(phi)*Math.cos(theta),radius*Math.cos(phi),radius*Math.sin(phi)*Math.sin(theta));
}
function makeGlowSprite(){
  const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');
  const g=x.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'rgba(234,255,253,1)');g.addColorStop(.25,'rgba(63,224,255,0.7)');g.addColorStop(1,'rgba(63,224,255,0)');
  x.fillStyle=g;x.fillRect(0,0,128,128);
  const tex=new THREE.CanvasTexture(c);
  return new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
}
function refreshMarkers(){
  markerMeshes.forEach(m=>markerGroup.remove(m.mesh));markerMeshes=[];
  places.forEach(p=>{
    const pos=latLonToVec(p.lat,p.lon,R+0.01);
    const grp=new THREE.Group();
    const core=new THREE.Mesh(new THREE.SphereGeometry(0.035,12,12),new THREE.MeshBasicMaterial({color:0xeafffd}));
    const glow=makeGlowSprite();glow.scale.set(0.42,0.42,1);
    const beamLen=0.55;
    const beam=new THREE.Mesh(new THREE.CylinderGeometry(0.006,0.05,beamLen,8,1,true),
      new THREE.MeshBasicMaterial({color:0x3fe0ff,transparent:true,opacity:.5,blending:THREE.AdditiveBlending,depthWrite:false}));
    beam.position.copy(pos.clone().normalize().multiplyScalar(beamLen/2));
    beam.lookAt(pos.clone().multiplyScalar(2));beam.rotateX(Math.PI/2);
    const ring=new THREE.Mesh(new THREE.RingGeometry(0.05,0.08,24),
      new THREE.MeshBasicMaterial({color:0x3fe0ff,transparent:true,opacity:.6,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
    ring.lookAt(pos.clone().multiplyScalar(2));
    grp.add(beam);grp.add(ring);grp.add(core);grp.add(glow);
    grp.position.copy(pos);grp.userData={place:p};
    markerGroup.add(grp);
    markerMeshes.push({mesh:grp,place:p,glow,ring,core});
  });
}
refreshMarkers();updateCount();

let rot={x:0.25,y:0},target={x:0.25,y:0},dragging=false,last={x:0,y:0},moved=0,autoSpin=true;
let dist=7.6;
function pt(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}
function onDown(e){dragging=true;moved=0;autoSpin=false;last=pt(e);renderer.domElement.style.cursor='grabbing';}
function onMove(e){
  const p=pt(e);
  if(dragging){const dx=p.x-last.x,dy=p.y-last.y;moved+=Math.abs(dx)+Math.abs(dy);
    target.y+=dx*0.005;target.x+=dy*0.005;target.x=Math.max(-1.2,Math.min(1.2,target.x));last=p;}
  hover(p);
}
function onUp(e){if(dragging&&moved<6)pick(pt(e));dragging=false;renderer.domElement.style.cursor='grab';}
renderer.domElement.addEventListener('mousedown',onDown);
addEventListener('mousemove',onMove);
addEventListener('mouseup',onUp);
renderer.domElement.addEventListener('touchstart',onDown,{passive:true});
renderer.domElement.addEventListener('touchmove',e=>onMove(e),{passive:true});
renderer.domElement.addEventListener('touchend',onUp);

renderer.domElement.addEventListener('wheel',e=>{
  e.preventDefault();autoSpin=false;
  if(e.ctrlKey){dist+=e.deltaY*0.02;dist=Math.max(4.2,Math.min(12,dist));return;}
  target.y+=e.deltaX*0.0045;
  target.x+=e.deltaY*0.0045;
  target.x=Math.max(-1.2,Math.min(1.2,target.x));
},{passive:false});

let pinch=0;
renderer.domElement.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pinch){dist+=(pinch-d)*0.02;dist=Math.max(4.2,Math.min(12,dist));}pinch=d;}
},{passive:true});
renderer.domElement.addEventListener('touchend',()=>pinch=0);

// 双击缩放（给没有触控板的鼠标用户一个缩放途径）
renderer.domElement.addEventListener('dblclick',()=>{
  autoSpin=false;
  dist = dist>5.6 ? 4.6 : 7.6;
});

const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
function ndc(p){mouse.x=(p.x/W)*2-1;mouse.y=-(p.y/H)*2+1;}
function pick(p){
  ndc(p);ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(markerMeshes.map(m=>m.mesh),true);
  if(hits.length){let g=hits[0].object;while(g.parent&&!g.userData.place)g=g.parent;if(g.userData.place)openView(g.userData.place);}
}
const tip=document.getElementById('tip');
function hover(p){
  ndc(p);ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(markerMeshes.map(m=>m.mesh),true);
  if(hits.length){let g=hits[0].object;while(g.parent&&!g.userData.place)g=g.parent;
    if(g.userData.place){tip.textContent=g.userData.place.name;tip.style.left=p.x+'px';tip.style.top=p.y+'px';tip.style.opacity=1;
      if(!dragging)renderer.domElement.style.cursor='pointer';return;}}
  tip.style.opacity=0;if(!dragging)renderer.domElement.style.cursor='grab';
}

let t=0;
function animate(){
  requestAnimationFrame(animate);t+=0.016;
  if(autoSpin)target.y+=0.0010;
  rot.x+=(target.x-rot.x)*0.08;rot.y+=(target.y-rot.y)*0.08;
  globe.rotation.x=rot.x;globe.rotation.y=rot.y;
  camera.position.z+=(dist-camera.position.z)*0.1;
  markerMeshes.forEach((m,i)=>{
    const s=1+Math.sin(t*2.4+i)*0.22;
    m.glow.scale.set(0.42*s,0.42*s,1);
    m.ring.scale.set(s,s,s);m.ring.material.opacity=0.5-0.3*Math.sin(t*2.4+i);
    m.ring.lookAt(camera.position);
  });
  renderer.render(scene,camera);
}
animate();
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);});

const viewScrim=document.getElementById('viewScrim'),viewCard=document.getElementById('viewCard');
function fmtDate(d){if(!d)return'';const x=new Date(d+'T00:00');if(isNaN(x))return d;
  return x.getFullYear()+'.'+String(x.getMonth()+1).padStart(2,'0')+'.'+String(x.getDate()).padStart(2,'0');}
function openView(p){
  const photos=(p.photos||[]).map(src=>`<div class="ph"><img src="${src}" alt=""></div>`).join('');
  viewCard.innerHTML=`
    <div class="coord">${p.lat.toFixed(4)}°, ${p.lon.toFixed(4)}°</div>
    <h3 class="place-name">${escapeHtml(p.name)}</h3>
    <div class="place-date">${fmtDate(p.date)||'未填日期'}</div>
    ${photos?`<div class="photos">${photos}</div>`:''}
    ${p.note?`<div class="note">${escapeHtml(p.note)}</div>`:''}
    <div class="card-actions">
      <button class="link" id="flyBtn">⌖ 飞到这里</button>
      <button class="link" id="editBtn">编辑</button>
      <button class="link danger" id="delBtn">删除</button>
    </div>`;
  viewScrim.classList.add('show');
  document.getElementById('delBtn').onclick=()=>{if(confirm('删除「'+p.name+'」这个节点？')){places=places.filter(x=>x.id!==p.id);save();viewScrim.classList.remove('show');}};
  document.getElementById('editBtn').onclick=()=>{viewScrim.classList.remove('show');openForm(p);};
  document.getElementById('flyBtn').onclick=()=>{flyTo(p);viewScrim.classList.remove('show');};
}
viewScrim.addEventListener('click',e=>{if(e.target===viewScrim)viewScrim.classList.remove('show');});
function flyTo(p){autoSpin=false;target.y=-(p.lon+180)*Math.PI/180-Math.PI/2;target.x=Math.max(-1.2,Math.min(1.2,p.lat*Math.PI/180));dist=5.0;}

const formScrim=document.getElementById('formScrim');
let editingId=null,draftPhotos=[],draftGeo=null;
function openForm(p){
  editingId=p?p.id:null;
  document.getElementById('formTitle').innerHTML=p?'<span class="pre">编辑</span>修改地点':'<span class="pre">新增</span>记录一个地点';
  document.getElementById('fPlace').value=p?p.name:'';
  document.getElementById('fDate').value=p?(p.date||''):new Date().toISOString().slice(0,10);
  document.getElementById('fNote').value=p?(p.note||''):'';
  draftPhotos=p?[...(p.photos||[])]:[];
  draftGeo=p?{lat:p.lat,lon:p.lon}:null;
  const st=document.getElementById('geoStatus');st.className='geo-status';
  st.textContent=p?`已定位 · ${p.lat.toFixed(2)}, ${p.lon.toFixed(2)}`:'';
  renderThumbs();formScrim.classList.add('show');
}
document.getElementById('addBtn').onclick=()=>openForm(null);
document.getElementById('cancelBtn').onclick=()=>formScrim.classList.remove('show');
formScrim.addEventListener('click',e=>{if(e.target===formScrim)formScrim.classList.remove('show');});

document.getElementById('geoBtn').onclick=async()=>{
  const name=document.getElementById('fPlace').value.trim();
  const st=document.getElementById('geoStatus');st.className='geo-status';
  if(!name){st.className='geo-status err';st.textContent='先填地点名称';return;}
  st.textContent='查找坐标中…';
  const local=lookupLocal(name);
  if(local){draftGeo=local;st.textContent=`已定位 · ${local.lat.toFixed(2)}, ${local.lon.toFixed(2)}`;return;}
  try{
    const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(name));
    const j=await r.json();
    if(j&&j[0]){draftGeo={lat:+j[0].lat,lon:+j[0].lon};st.textContent=`已定位 · ${draftGeo.lat.toFixed(2)}, ${draftGeo.lon.toFixed(2)}`;}
    else{st.className='geo-status err';st.textContent='未找到，试试加上国家名';}
  }catch(e){st.className='geo-status err';st.textContent='联网定位失败，可换常见城市或稍后重试';}
};
const LOCAL={
  '北京':[39.90,116.40],'上海':[31.23,121.47],'广州':[23.13,113.26],'成都':[30.57,104.07],
  '大理':[25.61,100.27],'西安':[34.34,108.94],'杭州':[30.27,120.15],'重庆':[29.56,106.55],
  '香港':[22.32,114.17],'台北':[25.03,121.57],'东京':[35.68,139.69],'京都':[35.01,135.77],
  '大阪':[34.69,135.50],'首尔':[37.57,126.98],'曼谷':[13.76,100.50],'新加坡':[1.35,103.82],
  '巴黎':[48.86,2.35],'伦敦':[51.51,-0.13],'罗马':[41.90,12.50],'纽约':[40.71,-74.01],
  '旧金山':[37.77,-122.42],'洛杉矶':[34.05,-118.24],'悉尼':[-33.87,151.21],'冰岛':[64.13,-21.90],
  'tokyo':[35.68,139.69],'paris':[48.86,2.35],'london':[51.51,-0.13],'new york':[40.71,-74.01],
  'rome':[41.90,12.50],'kyoto':[35.01,135.77],'bangkok':[13.76,100.50],'sydney':[-33.87,151.21]
};
function lookupLocal(name){const k=name.trim().toLowerCase();for(const key in LOCAL){if(key.toLowerCase()===k||name.includes(key))return{lat:LOCAL[key][0],lon:LOCAL[key][1]};}return null;}

document.getElementById('fPhotos').onchange=async e=>{for(const f of e.target.files){draftPhotos.push(await shrink(f));}renderThumbs();e.target.value='';};
function renderThumbs(){
  document.getElementById('thumbs').innerHTML=draftPhotos.map((src,i)=>`<div class="thumb"><img src="${src}"><button data-i="${i}">×</button></div>`).join('');
  document.querySelectorAll('.thumb button').forEach(b=>b.onclick=()=>{draftPhotos.splice(+b.dataset.i,1);renderThumbs();});
}
function shrink(file){return new Promise(res=>{const img=new Image(),url=URL.createObjectURL(file);
  img.onload=()=>{const max=1000;let w=img.width,h=img.height;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);res(c.toDataURL('image/jpeg',0.78));};
  img.src=url;});}

document.getElementById('saveBtn').onclick=()=>{
  const name=document.getElementById('fPlace').value.trim();
  if(!name){alert('给这个地方起个名字');return;}
  if(!draftGeo){alert('点「定位」找到它在地球上的位置');return;}
  const rec={id:editingId||('p'+Date.now()),name,lat:draftGeo.lat,lon:draftGeo.lon,
    date:document.getElementById('fDate').value,note:document.getElementById('fNote').value.trim(),photos:draftPhotos};
  if(editingId)places=places.map(p=>p.id===editingId?rec:p);else places.push(rec);
  try{save();}catch(err){alert('存储空间不足，照片太多或太大，删掉几张再试');return;}
  formScrim.classList.remove('show');flyTo(rec);
};

document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(places,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='旅迹备份_'+new Date().toISOString().slice(0,10)+'.json';a.click();
};
document.getElementById('importInput').onchange=e=>{
  const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const data=JSON.parse(rd.result);if(!Array.isArray(data))throw 0;
    if(confirm('导入会替换当前数据，确定吗？')){places=data;save();alert('导入成功，共 '+places.length+' 个地点');}}
    catch(err){alert('文件格式不对，请选择「旅迹」导出的备份文件');}e.target.value='';};
  rd.readAsText(f);
};
function escapeHtml(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
