<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ORBIT · Travel Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05080f; --bg-2:#0a0f1c;
    --panel:rgba(12,20,38,.82); --panel-line:rgba(80,200,230,.22);
    --cyan:#3fe0ff; --cyan-dim:#1c7d96; --teal:#21d4c4; --violet:#8b7bff; --amber:#ffcf4d;
    --text:#dceaf4; --text-dim:#7e93a8; --danger:#ff6b7d;
    --glow:0 0 20px rgba(63,224,255,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:'Space Grotesk',system-ui,sans-serif;}
  body{background:radial-gradient(circle at 50% 40%, #0b1426 0%, #05080f 60%, #02040a 100%);}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.7), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,.6), transparent),
      radial-gradient(1px 1px at 85% 20%, rgba(170,220,255,.6), transparent),
      radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,.4), transparent),
      radial-gradient(2px 2px at 55% 15%, rgba(170,220,255,.5), transparent);
    background-repeat:repeat;background-size:400px 400px;}
  #scene{position:fixed;inset:0;z-index:1;}
  canvas{display:block;}
  header{position:fixed;top:0;left:0;right:0;z-index:10;padding:20px 26px;display:flex;
    align-items:center;gap:16px;pointer-events:none;}
  .brand{display:flex;align-items:baseline;gap:12px;}
  .logo{font-weight:700;font-size:26px;letter-spacing:7px;color:var(--text);
    text-shadow:0 0 18px rgba(63,224,255,.5);}
  .logo b{color:var(--cyan);}
  .tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;
    color:var(--text-dim);text-transform:uppercase;}
  .stat{margin-left:auto;pointer-events:auto;display:flex;gap:22px;font-family:'JetBrains Mono',monospace;}
  .stat .k{font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;}
  .stat .v{font-size:22px;font-weight:700;color:var(--cyan);text-shadow:var(--glow);line-height:1;}
  .toolbar{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;justify-content:center;
    gap:12px;padding:24px;pointer-events:none;flex-wrap:wrap;}
  .btn{pointer-events:auto;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:500;
    font-size:14px;letter-spacing:1px;color:var(--text);background:var(--panel);
    padding:12px 22px;border:1px solid var(--panel-line);border-radius:10px;
    backdrop-filter:blur(12px);transition:.18s;display:inline-flex;align-items:center;gap:8px;}
  .btn:hover{border-color:var(--cyan);color:#fff;box-shadow:0 0 18px rgba(63,224,255,.3);
    transform:translateY(-2px);}
  .btn:active{transform:translateY(0);}
  .btn.primary{background:linear-gradient(135deg,rgba(63,224,255,.18),rgba(139,123,255,.18));
    border-color:var(--cyan);color:#fff;}
  .btn .ic{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--cyan);}
  .scrim{position:fixed;inset:0;z-index:30;background:rgba(3,6,12,.7);
    backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px;}
  .scrim.show{display:flex;animation:fade .2s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card{background:var(--panel);width:min(460px,94vw);max-height:88vh;overflow-y:auto;
    border:1px solid var(--panel-line);border-radius:16px;padding:0;position:relative;
    box-shadow:0 0 60px rgba(63,224,255,.12), inset 0 1px 0 rgba(255,255,255,.05);backdrop-filter:blur(16px);}
  .card-head{padding:22px 24px 18px;border-bottom:1px solid rgba(80,200,230,.14);position:relative;}
  .coord{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--cyan-dim);
    display:flex;gap:14px;margin-bottom:10px;}
  .coord b{color:var(--cyan);}
  .place-name{font-weight:700;font-size:30px;letter-spacing:.5px;margin:0;
    text-shadow:0 0 24px rgba(63,224,255,.3);}
  .place-date{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-dim);margin-top:6px;letter-spacing:1px;}
  .badge{position:absolute;top:20px;right:22px;font-family:'JetBrains Mono',monospace;font-size:10px;
    letter-spacing:2px;color:var(--teal);border:1px solid var(--teal);border-radius:20px;
    padding:4px 12px;text-transform:uppercase;box-shadow:0 0 14px rgba(33,212,196,.3);}
  .card-body{padding:20px 24px 24px;}
  .photos{display:flex;gap:12px;overflow-x:auto;padding:2px 0 14px;scroll-snap-type:x mandatory;}
  .photos::-webkit-scrollbar{height:6px;}
  .photos::-webkit-scrollbar-thumb{background:var(--cyan-dim);border-radius:6px;}
  .shot{flex:0 0 auto;position:relative;border-radius:10px;overflow:hidden;scroll-snap-align:center;
    border:1px solid rgba(80,200,230,.25);box-shadow:0 6px 22px rgba(0,0,0,.5);}
  .shot img{display:block;width:230px;height:165px;object-fit:cover;}
  .shot::after{content:"";position:absolute;inset:0;border-radius:10px;pointer-events:none;
    box-shadow:inset 0 0 30px rgba(63,224,255,.12);}
  .note{font-size:16px;line-height:1.6;color:var(--text);white-space:pre-wrap;margin-top:6px;
    padding:14px 16px;background:rgba(63,224,255,.05);border-left:2px solid var(--cyan);border-radius:0 8px 8px 0;}
  .card-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap;}
  .form{background:var(--panel);width:min(500px,94vw);max-height:90vh;overflow-y:auto;
    border:1px solid var(--panel-line);border-radius:16px;padding:26px;backdrop-filter:blur(16px);
    box-shadow:0 0 60px rgba(63,224,255,.12);}
  .form h2{font-weight:700;font-size:24px;letter-spacing:1px;margin:0 0 4px;text-shadow:0 0 20px rgba(63,224,255,.3);}
  .form .hint{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;
    color:var(--text-dim);margin:0 0 20px;text-transform:uppercase;}
  label{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;
    margin:18px 0 7px;color:var(--cyan);text-transform:uppercase;}
  input[type=text],input[type=date],textarea{width:100%;font-family:'Space Grotesk',sans-serif;
    font-size:15px;color:var(--text);background:rgba(5,10,20,.6);border:1px solid rgba(80,200,230,.2);
    border-radius:9px;padding:11px 13px;outline:none;transition:.16s;}
  input:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(63,224,255,.12);}
  textarea{min-height:84px;resize:vertical;line-height:1.5;}
  input[type=date]{font-family:'JetBrains Mono',monospace;color-scheme:dark;}
  .geo-row{display:flex;gap:10px;align-items:stretch;}
  .geo-row > div{flex:1;}
  .geo-row .btn{font-size:13px;padding:0 18px;}
  .geo-status{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--teal);min-height:18px;
    margin-top:8px;letter-spacing:.5px;}
  .thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .thumb{position:relative;width:68px;height:68px;border-radius:8px;overflow:hidden;border:1px solid rgba(80,200,230,.25);}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .thumb button{position:absolute;top:2px;right:2px;background:var(--danger);color:#fff;border:none;
    width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:12px;line-height:1;}
  .filepick{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;
    color:var(--cyan);border:1px dashed var(--cyan-dim);padding:10px 16px;border-radius:9px;margin-top:8px;
    font-family:'JetBrains Mono',monospace;letter-spacing:1px;transition:.16s;}
  .filepick:hover{border-color:var(--cyan);background:rgba(63,224,255,.06);}
  .filepick input{display:none;}
  .form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;}
  .link{cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1px;
    color:var(--text-dim);background:none;border:none;text-transform:uppercase;transition:.16s;}
  .link:hover{color:var(--text);}
  .link.danger{color:var(--danger);}
  .link.accent{color:var(--cyan);}
  #tip{position:fixed;z-index:20;pointer-events:none;background:rgba(5,12,24,.92);color:var(--cyan);
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1px;padding:5px 11px;
    border:1px solid var(--cyan-dim);border-radius:7px;transform:translate(-50%,-150%);opacity:0;
    transition:opacity .12s;white-space:nowrap;box-shadow:0 0 16px rgba(63,224,255,.3);}
  .empty{position:fixed;top:52%;left:50%;transform:translate(-50%,-50%);z-index:5;text-align:center;
    pointer-events:none;opacity:.9;}
  .empty .big{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:4px;
    color:var(--text-dim);text-transform:uppercase;}
  .empty .small{font-size:15px;color:var(--text-dim);margin-top:10px;letter-spacing:1px;}
  .hidden{display:none!important;}
  .help{position:fixed;left:24px;bottom:88px;z-index:9;font-family:'JetBrains Mono',monospace;
    font-size:10px;letter-spacing:1.5px;color:var(--text-dim);line-height:1.8;pointer-events:none;text-transform:uppercase;}
  .help span{color:var(--cyan-dim);}
  @media (max-width:560px){
    .logo{font-size:21px;letter-spacing:4px;} .stat{gap:14px;} .stat .v{font-size:18px;} .help{display:none;}
  }
</style>
</head>
<body>
<div id="scene"></div>
<header>
  <div class="brand"><span class="logo">OR<b>BIT</b></span><span class="tag">// travel log</span></div>
  <div class="stat">
    <div><div class="k">Places</div><div class="v" id="countPlaces">0</div></div>
    <div><div class="k">Countries</div><div class="v" id="countCountries">0</div></div>
  </div>
</header>
<div class="empty" id="empty">
  <div class="big">No signals yet</div>
  <div class="small">点击下方 LOG A PLACE，点亮你去过的第一个坐标</div>
</div>
<div class="help">
  <div><span>DRAG / SWIPE</span> &nbsp;rotate</div>
  <div><span>SCROLL / PINCH</span> &nbsp;zoom</div>
  <div><span>CLICK NODE</span> &nbsp;open log</div>
</div>
<div class="toolbar">
  <button class="btn primary" id="addBtn"><span class="ic">+</span> Log a place</button>
  <button class="btn" id="exportBtn"><span class="ic">&darr;</span> Export</button>
  <label class="btn" style="cursor:pointer"><span class="ic">&uarr;</span> Import
    <input type="file" id="importInput" accept="application/json" style="display:none"></label>
</div>
<div id="tip"></div>
<div class="scrim" id="viewScrim"><div class="card" id="viewCard"></div></div>
<div class="scrim" id="formScrim">
  <div class="form">
    <h2 id="formTitle">Log a place</h2>
    <p class="hint">// register a new coordinate</p>
    <label>Location</label>
    <div class="geo-row">
      <div><input type="text" id="fPlace" placeholder="Kyoto / 大理 / Reykjavik"></div>
      <button class="btn" id="geoBtn"><span class="ic">&oplus;</span> Locate</button>
    </div>
    <div class="geo-status" id="geoStatus"></div>
    <label>Date visited</label>
    <input type="date" id="fDate">
    <label>Field notes</label>
    <textarea id="fNote" placeholder="天气、遇到的人、吃到的东西、想再回去的理由…"></textarea>
    <label>Photos</label>
    <label class="filepick">+ Add photos<input type="file" id="fPhotos" accept="image/*" multiple></label>
    <div class="thumbs" id="thumbs"></div>
    <div class="form-actions">
      <button class="link" id="cancelBtn">Cancel</button>
      <button class="btn primary" id="saveBtn">Save node</button>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const KEY='travel-journal-v2';
let places=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(places));refreshMarkers();updateCount();}
function updateCount(){
  document.getElementById('countPlaces').textContent=places.length;
  const c=new Set(places.map(p=>p.country).filter(Boolean));
  document.getElementById('countCountries').textContent=c.size||(places.length?'-':0);
  document.getElementById('empty').classList.toggle('hidden',places.length>0);
}
const sceneEl=document.getElementById('scene');
let W=innerWidth,H=innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,H);sceneEl.appendChild(renderer.domElement);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42,W/H,0.1,100);
camera.position.set(0,0,7.6);
const globe=new THREE.Group();scene.add(globe);
const R=2.4;
const surf=new THREE.Mesh(new THREE.SphereGeometry(R,64,64),
  new THREE.MeshPhongMaterial({color:0x0a1426,emissive:0x06101f,shininess:18,specular:0x123048}));
globe.add(surf);
const grid=new THREE.Mesh(new THREE.SphereGeometry(R*1.002,36,24),
  new THREE.MeshBasicMaterial({color:0x1d567a,wireframe:true,transparent:true,opacity:.25}));
globe.add(grid);
const atmo=new THREE.Mesh(new THREE.SphereGeometry(R*1.12,48,48),
  new THREE.MeshBasicMaterial({color:0x2bb6e0,transparent:true,opacity:.10,side:THREE.BackSide}));
globe.add(atmo);
const CONTINENTS=[
  {abbr:'NA',label:[-100,45],poly:[[-168,65],[-150,68],[-120,60],[-95,49],[-80,45],[-66,45],[-80,28],[-97,18],[-105,23],[-117,32],[-125,42],[-135,58],[-160,60]]},
  {abbr:'SA',label:[-58,-15],poly:[[-82,9],[-70,8],[-50,-2],[-35,-8],[-48,-25],[-58,-38],[-70,-52],[-73,-32],[-78,-10],[-80,2]]},
  {abbr:'EU',label:[16,52],poly:[[-10,44],[2,50],[12,55],[28,60],[42,66],[60,68],[50,54],[42,46],[28,46],[14,45],[0,43]]},
  {abbr:'AF',label:[20,5],poly:[[-12,35],[10,37],[33,31],[44,12],[51,12],[42,-2],[40,-18],[25,-34],[14,-22],[8,4],[-6,5],[-16,15],[-17,25]]},
  {abbr:'AS',label:[95,48],poly:[[44,42],[60,56],[90,68],[125,72],[150,68],[178,64],[150,52],[140,44],[122,40],[120,22],[105,10],[92,20],[78,8],[70,24],[58,30],[48,38]]},
  {abbr:'OC',label:[134,-25],poly:[[114,-12],[132,-11],[146,-18],[151,-28],[140,-39],[128,-32],[116,-34],[113,-22]]},
  {abbr:'AN',label:[0,-82],poly:[[-180,-72],[-120,-74],[-60,-72],[0,-73],[60,-72],[120,-74],[180,-72],[180,-88],[-180,-88]]},
];
function pointInPoly(lon,lat,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
    if(((yi>lat)!=(yj>lat))&&(lon<(xj-xi)*(lat-yi)/(yj-yi)+xi))inside=!inside;
  }return inside;
}
function latLonToVec(lat,lon,radius){
  const phi=(90-lat)*Math.PI/180,theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-radius*Math.sin(phi)*Math.cos(theta),radius*Math.cos(phi),radius*Math.sin(phi)*Math.sin(theta));
}
(function buildLand(){
  const pts=[];
  for(let lat=-85;lat<=83;lat+=2.2){
    for(let lon=-178;lon<=178;lon+=2.2){
      for(const c of CONTINENTS){if(pointInPoly(lon,lat,c.poly)){pts.push(latLonToVec(lat,lon,R+0.012));break;}}
    }
  }
  const geo=new THREE.BufferGeometry();
  const arr=new Float32Array(pts.length*3);
  pts.forEach((p,i)=>{arr[i*3]=p.x;arr[i*3+1]=p.y;arr[i*3+2]=p.z;});
  geo.setAttribute('position',new THREE.BufferAttribute(arr,3));
  globe.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0x35c9e8,size:0.032,transparent:true,opacity:.85,sizeAttenuation:true})));
})();
function makeLabel(text){
  const c=document.createElement('canvas');c.width=128;c.height=64;
  const x=c.getContext('2d');
  x.font='700 38px "JetBrains Mono", monospace';x.fillStyle='rgba(63,224,255,0.92)';
  x.textAlign='center';x.textBaseline='middle';x.shadowColor='rgba(63,224,255,0.9)';x.shadowBlur=12;
  x.fillText(text,64,34);
  const tex=new THREE.CanvasTexture(c);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:true,opacity:.9}));
  sp.scale.set(0.55,0.275,1);return sp;
}
CONTINENTS.forEach(c=>{if(c.abbr==='AN')return;const sp=makeLabel(c.abbr);
  sp.position.copy(latLonToVec(c.label[1],c.label[0],R+0.16));globe.add(sp);});
scene.add(new THREE.AmbientLight(0x223a55,1.1));
const key=new THREE.DirectionalLight(0x88c8ff,.9);key.position.set(5,3,5);scene.add(key);
const rim=new THREE.DirectionalLight(0x3fe0ff,.5);rim.position.set(-5,-1,-4);scene.add(rim);
const markerGroup=new THREE.Group();globe.add(markerGroup);
let markerMeshes=[];
function makeGlowSprite(color){
  const c=document.createElement('canvas');c.width=128;c.height=128;
  const x=c.getContext('2d');
  const g=x.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(.25,color);g.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=g;x.fillRect(0,0,128,128);return new THREE.CanvasTexture(c);
}
const glowTex=makeGlowSprite('rgba(63,224,255,0.95)');
function refreshMarkers(){
  markerMeshes.forEach(m=>markerGroup.remove(m.mesh));markerMeshes=[];
  places.forEach(p=>{
    const pos=latLonToVec(p.lat,p.lon,R+0.02);
    const grp=new THREE.Group();
    const core=new THREE.Mesh(new THREE.SphereGeometry(0.04,12,12),new THREE.MeshBasicMaterial({color:0xffffff}));
    const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,transparent:true,
      blending:THREE.AdditiveBlending,depthWrite:false,opacity:.9}));
    glow.scale.set(0.42,0.42,1);
    const beam=new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.045,0.55,8,1,true),
      new THREE.MeshBasicMaterial({color:0x3fe0ff,transparent:true,opacity:.35,
        blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide}));
    const out=pos.clone().normalize();
    beam.position.copy(out.clone().multiplyScalar(0.28));
    beam.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),out);
    grp.add(beam);grp.add(glow);grp.add(core);
    grp.position.copy(pos);grp.userData={place:p,glow,core};
    markerGroup.add(grp);markerMeshes.push({mesh:grp,place:p,glow});
  });
}
refreshMarkers();updateCount();
let rot={x:0.25,y:0},target={x:0.25,y:0},dragging=false,last={x:0,y:0},moved=0,autoSpin=true;
let dist=7.6;
function pt(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}
function onDown(e){dragging=true;moved=0;autoSpin=false;last=pt(e);}
function onMove(e){
  const p=pt(e);
  if(dragging){const dx=p.x-last.x,dy=p.y-last.y;moved+=Math.abs(dx)+Math.abs(dy);
    target.y+=dx*0.005;target.x+=dy*0.005;target.x=Math.max(-1.2,Math.min(1.2,target.x));last=p;}
  hover(p);
}
function onUp(e){if(dragging&&moved<6)pick(last);dragging=false;}
renderer.domElement.addEventListener('mousedown',onDown);
addEventListener('mousemove',onMove);addEventListener('mouseup',onUp);
renderer.domElement.addEventListener('touchstart',onDown,{passive:true});
renderer.domElement.addEventListener('touchmove',e=>onMove(e),{passive:true});
renderer.domElement.addEventListener('touchend',onUp);
renderer.domElement.addEventListener('wheel',e=>{
  e.preventDefault();autoSpin=false;
  if(e.ctrlKey){dist+=e.deltaY*0.02;}
  else if(Math.abs(e.deltaX)>Math.abs(e.deltaY)){target.y+=e.deltaX*0.004;}
  else{target.x+=e.deltaY*0.004;target.x=Math.max(-1.2,Math.min(1.2,target.x));}
  dist=Math.max(4.2,Math.min(12,dist));
},{passive:false});
let pinch=0;
renderer.domElement.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pinch){dist+=(pinch-d)*0.02;dist=Math.max(4.2,Math.min(12,dist));}pinch=d;
  }
},{passive:true});
renderer.domElement.addEventListener('touchend',()=>pinch=0);
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
function ndc(p){mouse.x=(p.x/W)*2-1;mouse.y=-(p.y/H)*2+1;}
function pick(p){
  ndc(p);ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(markerMeshes.map(m=>m.mesh),true);
  if(hits.length){let g=hits[0].object;while(g.parent&&!g.userData.place)g=g.parent;
    if(g.userData.place)openView(g.userData.place);}
}
const tip=document.getElementById('tip');
function hover(p){
  ndc(p);ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(markerMeshes.map(m=>m.mesh),true);
  if(hits.length){let g=hits[0].object;while(g.parent&&!g.userData.place)g=g.parent;
    if(g.userData.place){tip.textContent=g.userData.place.name;tip.style.left=p.x+'px';
      tip.style.top=p.y+'px';tip.style.opacity=1;renderer.domElement.style.cursor='pointer';return;}}
  tip.style.opacity=0;renderer.domElement.style.cursor='grab';
}
let tt=0;
function animate(){
  requestAnimationFrame(animate);tt+=0.016;
  if(autoSpin)target.y+=0.0011;
  rot.x+=(target.x-rot.x)*0.08;rot.y+=(target.y-rot.y)*0.08;
  globe.rotation.x=rot.x;globe.rotation.y=rot.y;
  camera.position.z+=(dist-camera.position.z)*0.1;
  markerMeshes.forEach((m,i)=>{const s=0.42+Math.sin(tt*2.4+i)*0.1;m.glow.scale.set(s,s,1);
    m.glow.material.opacity=0.7+Math.sin(tt*2.4+i)*0.25;});
  renderer.render(scene,camera);
}
animate();
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;camera.aspect=W/H;
  camera.updateProjectionMatrix();renderer.setSize(W,H);});
const viewScrim=document.getElementById('viewScrim');
const viewCard=document.getElementById('viewCard');
function fmtDate(d){if(!d)return'';const x=new Date(d+'T00:00');if(isNaN(x))return d;
  return x.getFullYear()+'.'+String(x.getMonth()+1).padStart(2,'0')+'.'+String(x.getDate()).padStart(2,'0');}
function openView(p){
  const shots=(p.photos||[]).map(src=>'<div class="shot"><img src="'+src+'" alt=""></div>').join('');
  viewCard.innerHTML=
    '<div class="card-head"><div class="badge">Visited</div>'+
    '<div class="coord"><span>LAT <b>'+p.lat.toFixed(3)+'</b></span><span>LON <b>'+p.lon.toFixed(3)+'</b></span></div>'+
    '<h3 class="place-name">'+escapeHtml(p.name)+'</h3>'+
    '<div class="place-date">'+(fmtDate(p.date)||'date unknown')+'</div></div>'+
    '<div class="card-body">'+
    (shots?'<div class="photos">'+shots+'</div>':'')+
    (p.note?'<div class="note">'+escapeHtml(p.note)+'</div>':'')+
    '<div class="card-actions">'+
    '<button class="link accent" id="flyBtn">&#9655; Fly here</button>'+
    '<button class="link" id="editBtn">Edit</button>'+
    '<button class="link danger" id="delBtn">Delete</button></div></div>';
  viewScrim.classList.add('show');
  document.getElementById('delBtn').onclick=()=>{if(confirm('删除「'+p.name+'」这个坐标？')){
    places=places.filter(x=>x.id!==p.id);save();viewScrim.classList.remove('show');}};
  document.getElementById('editBtn').onclick=()=>{viewScrim.classList.remove('show');openForm(p);};
  document.getElementById('flyBtn').onclick=()=>{flyTo(p);viewScrim.classList.remove('show');};
}
viewScrim.addEventListener('click',e=>{if(e.target===viewScrim)viewScrim.classList.remove('show');});
function flyTo(p){autoSpin=false;target.y=-(p.lon+180)*Math.PI/180-Math.PI/2;
  target.x=Math.max(-1.2,Math.min(1.2,p.lat*Math.PI/180));dist=5.0;}
const formScrim=document.getElementById('formScrim');
let editingId=null,draftPhotos=[],draftGeo=null,draftCountry=null;
function openForm(p){
  editingId=p?p.id:null;
  document.getElementById('formTitle').textContent=p?'Edit node':'Log a place';
  document.getElementById('fPlace').value=p?p.name:'';
  document.getElementById('fDate').value=p?(p.date||''):new Date().toISOString().slice(0,10);
  document.getElementById('fNote').value=p?(p.note||''):'';
  draftPhotos=p?[...(p.photos||[])]:[];
  draftGeo=p?{lat:p.lat,lon:p.lon}:null;draftCountry=p?p.country:null;
  document.getElementById('geoStatus').textContent=p?('\u25c9 '+p.lat.toFixed(3)+', '+p.lon.toFixed(3)):'';
  renderThumbs();formScrim.classList.add('show');
}
document.getElementById('addBtn').onclick=()=>openForm(null);
document.getElementById('cancelBtn').onclick=()=>formScrim.classList.remove('show');
formScrim.addEventListener('click',e=>{if(e.target===formScrim)formScrim.classList.remove('show');});
document.getElementById('geoBtn').onclick=async()=>{
  const name=document.getElementById('fPlace').value.trim();
  const st=document.getElementById('geoStatus');
  if(!name){st.textContent='// enter a location first';return;}
  st.textContent='// locating…';
  const local=lookupLocal(name);
  if(local){draftGeo={lat:local[0],lon:local[1]};draftCountry=local[2];
    st.textContent='\u25c9 '+local[0].toFixed(3)+', '+local[1].toFixed(3);return;}
  try{
    const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&addressdetails=1&q='+encodeURIComponent(name));
    const j=await r.json();
    if(j&&j[0]){draftGeo={lat:+j[0].lat,lon:+j[0].lon};
      draftCountry=(j[0].address&&j[0].address.country_code||'').toUpperCase()||null;
      st.textContent='\u25c9 '+draftGeo.lat.toFixed(3)+', '+draftGeo.lon.toFixed(3);}
    else st.textContent='// not found — try adding country name';
  }catch(e){st.textContent='// offline — pick a known city or retry later';}
};
const LOCAL={
  '北京':[39.90,116.40,'CN'],'上海':[31.23,121.47,'CN'],'广州':[23.13,113.26,'CN'],'成都':[30.57,104.07,'CN'],
  '大理':[25.61,100.27,'CN'],'西安':[34.34,108.94,'CN'],'杭州':[30.27,120.15,'CN'],'重庆':[29.56,106.55,'CN'],
  '香港':[22.32,114.17,'HK'],'台北':[25.03,121.57,'TW'],'东京':[35.68,139.69,'JP'],'京都':[35.01,135.77,'JP'],
  '大阪':[34.69,135.50,'JP'],'首尔':[37.57,126.98,'KR'],'曼谷':[13.76,100.50,'TH'],'新加坡':[1.35,103.82,'SG'],
  '巴黎':[48.86,2.35,'FR'],'伦敦':[51.51,-0.13,'GB'],'罗马':[41.90,12.50,'IT'],'纽约':[40.71,-74.01,'US'],
  '旧金山':[37.77,-122.42,'US'],'洛杉矶':[34.05,-118.24,'US'],'悉尼':[-33.87,151.21,'AU'],'冰岛':[64.13,-21.90,'IS'],
  'tokyo':[35.68,139.69,'JP'],'paris':[48.86,2.35,'FR'],'london':[51.51,-0.13,'GB'],'new york':[40.71,-74.01,'US'],
  'rome':[41.90,12.50,'IT'],'kyoto':[35.01,135.77,'JP'],'bangkok':[13.76,100.50,'TH'],'sydney':[-33.87,151.21,'AU'],
  'reykjavik':[64.13,-21.90,'IS'],'singapore':[1.35,103.82,'SG'],'seoul':[37.57,126.98,'KR']
};
function lookupLocal(name){const k=name.trim().toLowerCase();
  for(const key in LOCAL){if(key.toLowerCase()===k||name.includes(key))return LOCAL[key];}return null;}
document.getElementById('fPhotos').onchange=async e=>{
  for(const file of e.target.files){draftPhotos.push(await shrink(file));}renderThumbs();e.target.value='';};
function renderThumbs(){
  document.getElementById('thumbs').innerHTML=draftPhotos.map((src,i)=>
    '<div class="thumb"><img src="'+src+'"><button data-i="'+i+'">×</button></div>').join('');
  document.querySelectorAll('.thumb button').forEach(b=>b.onclick=()=>{draftPhotos.splice(+b.dataset.i,1);renderThumbs();});
}
function shrink(file){
  return new Promise(res=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{const max=1000;let w=img.width,h=img.height;
      if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg',0.78));};
    img.src=url;});
}
document.getElementById('saveBtn').onclick=()=>{
  const name=document.getElementById('fPlace').value.trim();
  if(!name){alert('给这个地点起个名字');return;}
  if(!draftGeo){alert('点 Locate 找到它在地球上的坐标');return;}
  const rec={id:editingId||('p'+Date.now()),name,lat:draftGeo.lat,lon:draftGeo.lon,
    country:draftCountry,date:document.getElementById('fDate').value,
    note:document.getElementById('fNote').value.trim(),photos:draftPhotos};
  if(editingId)places=places.map(p=>p.id===editingId?rec:p);else places.push(rec);
  try{save();}catch(err){alert('存储空间不足，照片太多/太大，删几张再试');return;}
  formScrim.classList.remove('show');flyTo(rec);
};
document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(places,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='orbit_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();
};
document.getElementById('importInput').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{const data=JSON.parse(rd.result);if(!Array.isArray(data))throw 0;
    if(confirm('导入会替换当前数据，确定？（建议先 Export 备份）')){
      places=data;save();alert('已导入 '+places.length+' 个坐标');}}
    catch(err){alert('文件格式不对，请选择 ORBIT 导出的备份');}e.target.value='';};
  rd.readAsText(f);
};
function escapeHtml(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
